<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마일 치과 - 온라인 예약</title>
    <link rel="stylesheet" href="./css/index.css" />
    <link rel="stylesheet" href="./css/login.css" />
    <style>
        .reservation-container {
            max-width: 900px;
            margin: 4rem auto;
            padding: 2.5rem;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.06);
        }

        .form-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .form-header h2 {
            color: var(--text-dark, #1a1a1a);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .form-header p {
            color: var(--text-light, #666666);
            font-size: 0.95rem;
        }

        .user-info-preview {
            background-color: var(--primary-light, #e6f2ff);
            padding: 1rem 1.2rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            color: var(--primary, #0066cc);
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .dashboard-section {
            margin-top: 1.5rem;
            padding: 1.2rem;
            border: 1px solid #e9eef5;
            border-radius: 16px;
            background: #fbfdff;
        }

        .dashboard-section h3 {
            margin: 0 0 0.5rem;
            font-size: 1.1rem;
            color: #17324d;
        }

        .dashboard-section p {
            margin: 0 0 1rem;
            color: #6b7280;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: #2d3e50;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            border: 1px solid var(--border, #e0e0e0);
            border-radius: 12px;
            padding: 0.8rem 0.9rem;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: 2px solid rgba(31, 103, 214, 0.16);
            border-color: var(--primary);
        }

        .btn-block,
        .btn-inline {
            padding: 0.8rem 1rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            border: none;
            transition: transform 0.15s ease, background 0.2s ease;
        }

        .btn-block:hover,
        .btn-inline:hover {
            transform: translateY(-1px);
        }

        .btn-block {
            width: 100%;
            background: var(--primary, #0066cc);
            color: #fff;
        }

        .btn-inline {
            background: #eef5ff;
            color: var(--primary, #0066cc);
        }

        .btn-danger {
            background: #ffe5e5;
            color: #d14343;
        }

        .admin-grid {
            display: grid;
            gap: 1rem;
        }

        .list-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            padding: 0.9rem 1rem;
            border: 1px solid #e7edf4;
            border-radius: 12px;
            background: #fff;
            margin-bottom: 0.75rem;
        }

        .list-card strong {
            display: block;
            margin-bottom: 0.2rem;
        }

        .list-card small {
            color: #6b7280;
        }

        .badges {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-block;
            padding: 0.24rem 0.55rem;
            border-radius: 999px;
            font-size: 0.78rem;
            background: #eef5ff;
            color: #2563eb;
        }

        .badge.pending {
            background: #fff7d6;
            color: #b36a00;
        }

        .badge.confirmed {
            background: #e8f8ee;
            color: #0f8a47;
        }

        .badge.cancelled {
            background: #ffe5e5;
            color: #d14343;
        }

        .action-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .notice-item {
            padding: 0.8rem 0.95rem;
            border: 1px solid #e7edf4;
            border-radius: 12px;
            background: #fff;
            margin-bottom: 0.7rem;
        }

        .notice-item strong {
            display: block;
            margin-bottom: 0.25rem;
        }

        .empty-state {
            padding: 1rem;
            border-radius: 12px;
            background: #f8fafc;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>

<body>
    <header class="header">
        <nav class="navbar">
            <div class="container">
                <div class="nav-wrapper">
                    <a href="index.html" class="logo">
                        <span class="logo-text">SmileDental</span>
                    </a>
                    <div>
                        <span id="welcomeMessage"
                            style="margin-right: 1rem; font-size: 0.95rem; font-weight: 500;"></span>
                        <button id="btnLogout" class="btn btn-secondary"
                            style="padding: 0.5rem 1rem; border-radius: 8px;">로그아웃</button>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="reservation-container">
            <div class="form-header">
                <h2 id="pageTitle">진료 예약 신청</h2>
                <p id="pageSubtitle">원하시는 진료 항목과 일시를 선택해 주세요.</p>
            </div>

            <div class="user-info-preview">
                <span id="infoName">접속자: 확인 중...</span>
                <span id="infoPhone">전화번호: 확인 중...</span>
            </div>

            <div id="userPanel"></div>
            <div id="adminPanel"></div>
        </div>
    </main>

    <script type="module" src="reservation.js"></script>
</body>

</html>
